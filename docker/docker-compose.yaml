services:
  lifeline-db:
    container_name: lifeline-db
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${DATABASE_POSTGRES_NAME}
      POSTGRES_USER: ${DATABASE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DATABASE_POSTGRES_PASSWORD}
    ports:
      - 30001:${DATABASE_POSTGRES_PORT}
    networks:
      - lifeline
    volumes:
      - lifeline-postgres-data:/var/lib/postgresql

  lifeline-app:
    container_name: lifeline-app
    image: lifeline-app-image
    env_file:
      - .env
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "30000:30000"
    networks:
      - lifeline

  lifeline-react-dev:
    container_name: lifeline-react-dev
    image: lifeline-react-dev-image
    build:
      context: ..
      dockerfile: docker/react-dev.dockerfile
    networks:
      - lifeline
    working_dir: /app
    command:
      - sh
      - -lc
      - npm run dev -- --host 0.0.0.0 --port 5173 --strictPort
    environment:
      CHOKIDAR_USEPOLLING: "false"
    ports:
      - "5173:5173"
    volumes:
      - ../internal/presentation/http/web:/app
      - lifeline-react-dev-node-modules:/app/node_modules

volumes:
  lifeline-postgres-data:
  lifeline-react-dev-node-modules:

networks:
  lifeline:
    external: true
    name: lifeline
